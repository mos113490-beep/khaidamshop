<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Khaidam Gamingshop</title>
<style>
body{
  margin:0;
  font-family:sans-serif;
  background: url('images/เมือง3dโทนสีม่วงพื้นเงา_202603240058.jpeg') no-repeat center center fixed;
  background-size: cover;
  color:white;
}
header{
  background:#020617;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo{
  font-size:20px;
  font-weight:bold;
  color:#38bdf8;
}
.container{
  padding:20px;
  max-width:1100px;
  margin:auto;
}
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}
.card{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
}
.card img{
  border-radius:8px;
  width:100%;
  margin-bottom:10px;
}
button{
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-top:10px;
}
.buy{background:#22c55e;color:white}
.edit{background:#eab308;color:black}
.delete{background:#ef4444;color:white}
.panel{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  margin-top:20px;
}
input,select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
  border:none;
}
.order{
  border-bottom:1px solid #334155;
  padding:10px;
}
.paybox{
  background:#1e293b;
  padding:15px;
  border-radius:8px;
  margin-top:10px;
}
</style>
</head>
<body>

<header>
  <div class="logo">Khaidam Gamingshop</div>
  <div id="userpanel"></div>
</header>

<div class="container">
  <div id="login"></div>
  <div id="shop"></div>
  <div id="pay"></div>
  <div id="orders"></div>
  <div id="admin"></div>
</div>

<script>
// สินค้าเริ่มต้น
let products = JSON.parse(localStorage.getItem("products")) || [
  {name:"ไก่ตันเงิน 1M", price:120, img:"images/lv_0_20260324005216.jpg"},
  {name:"ไก่ตันเงิน 100K", price:12, img:"images/lv_0_20260324005321.jpg"}
];

// ผู้ใช้
let users = JSON.parse(localStorage.getItem("users")) || [];

// ออเดอร์
let orders = JSON.parse(localStorage.getItem("orders")) || [];

let currentUser = null;

// Captcha
function generateCaptcha(){
  let a=Math.floor(Math.random()*10);
  let b=Math.floor(Math.random()*10);
  let op = ['+','-','*'][Math.floor(Math.random()*3)];
  let question = `${a} ${op} ${b} = ?`;
  let answer;
  if(op=='+') answer=a+b;
  if(op=='-') answer=a-b;
  if(op=='*') answer=a*b;
  return {question,answer};
}
let captcha = generateCaptcha();

function save(){
  localStorage.setItem("products",JSON.stringify(products));
  localStorage.setItem("users",JSON.stringify(users));
  localStorage.setItem("orders",JSON.stringify(orders));
}

// Login
function showLogin(){
  document.getElementById("login").innerHTML=`
  <div class="panel">
    <h2>เข้าสู่ระบบ</h2>
    <input id="loginUser" placeholder="username">
    <input id="loginPass" type="password" placeholder="password">
    <button onclick="login()">Login</button>
    <p onclick="showRegister()" style="cursor:pointer;color:#38bdf8">สมัครสมาชิก</p>
  </div>`;
}

// Register
function showRegister(){
  captcha = generateCaptcha();
  document.getElementById("login").innerHTML=`
  <div class="panel">
    <h2>สมัครสมาชิก</h2>
    <input id="regUser" placeholder="username">
    <input id="regPass" type="password" placeholder="password">
    <p>กรอกคำตอบ: ${captcha.question}</p>
    <input id="captchaInput" placeholder="คำตอบ">
    <button onclick="register()">สมัคร</button>
  </div>`;
}

function register(){
  let u=document.getElementById("regUser").value;
  let p=document.getElementById("regPass").value;
  let c=parseInt(document.getElementById("captchaInput").value);
  if(!u || !p || isNaN(c)) return alert("กรอกข้อมูลให้ครบ");
  if(c!==captcha.answer) return alert("คำตอบ Captcha ไม่ถูกต้อง");
  if(users.find(x=>x.u==u)) return alert("มี username นี้แล้ว");
  users.push({u,p});
  save();
  alert("สมัครสำเร็จ");
  showLogin();
}

function login(){
  let u=document.getElementById("loginUser").value;
  let p=document.getElementById("loginPass").value;
  if(u=="danainat" && p=="danainat"){
    currentUser={u:"danainat",admin:true};
  } else {
    let user=users.find(x=>x.u==u && x.p==p);
    if(!user) return alert("ข้อมูลผิด");
    currentUser={u:user.u};
  }
  loadUser();
}

function loadUser(){
  document.getElementById("login").innerHTML="";
  document.getElementById("userpanel").innerHTML=`
    <span>${currentUser.u}</span>
    <button onclick="logout()">Logout</button>`;
  loadShop();
  showPay();
  if(currentUser.admin){
    showAdmin();
  } else {
    showOrders();
  }
}

function logout(){
  currentUser=null;
  location.reload();
}

// แสดงสินค้า
function loadShop(){
  let html="<h2>สินค้า</h2><div class='products'>";
  products.forEach((p,i)=>{
    html+=`
    <div class="card">
      <img src="${p.img}" alt="${p.name}">
      <h3>${p.name}</h3>
      ราคา ${p.price} บาท
      <button class="buy" onclick="buy(${i})">สั่งซื้อ</button>
      ${currentUser.admin?`
        <button class="edit" onclick="editProduct(${i})">แก้ไข</button>
        <button class="delete" onclick="deleteProduct(${i})">ลบ</button>
      `:""}
    </div>`;
  });
  html+="</div>";
  document.getElementById("shop").innerHTML=html;
}

// ช่องทางชำระเงิน + QR
function showPay(){
  document.getElementById("pay").innerHTML=`
  <h2>ช่องทางชำระเงิน</h2>
  <div class="paybox">
    TrueMoney : 096-817-7154
    <br><img src="images/004999204438773_20251021_133007.jpeg" width="150">
  </div>
  <div class="paybox">
    KBank : 201-3-16151-0
  </div>`;
}

// สั่งซื้อสินค้า
function buy(i){
  captcha = generateCaptcha();
  let answer = prompt(`Captcha ตรวจสอบบอท: ${captcha.question}`);
  if(parseInt(answer)!==captcha.answer) return alert("คำตอบ Captcha ไม่ถูกต้อง");

  let file=document.createElement("input");
  file.type="file";
  file.accept="image/*";
  file.onchange=e=>{
    let reader=new FileReader();
    reader.onload=function(){
      orders.push({
        user:currentUser.u,
        product:products[i].name,
        price:products[i].price,
        slip:reader.result,
        status:"รอดำเนินการ",
        msg:""
      });
      save();
      alert("ส่งออเดอร์สำเร็จ");
      showOrders();
    }
    reader.readAsDataURL(e.target.files[0]);
  }
  file.click();
}

// แสดงออเดอร์ผู้ใช้
function showOrders(){
  let my=orders.filter(o=>o.user==currentUser.u);
  let html="<div class='panel'><h2>ประวัติการสั่งซื้อ</h2>";
  my.forEach(o=>{
    html+=`
    <div class="order">
      สินค้า: ${o.product}<br>
      ราคา: ${o.price}<br>
      สถานะ: ${o.status}<br>
      ข้อความแอดมิน: ${o.msg}<br>
      <img src="${o.slip}" width="200">
    </div>`;
  });
  html+="</div>";
  document.getElementById("orders").innerHTML=html;
}

// Admin Dashboard
function showAdmin(){
  let html=`
  <div class="panel">
    <h2>Admin Dashboard</h2>
    ออเดอร์ทั้งหมด ${orders.length}
    <h3>เพิ่มสินค้า</h3>
    <input id="pname" placeholder="ชื่อสินค้า">
    <input id="pprice" placeholder="ราคา">
    <input id="pfile" type="file" accept="image/*">
    <button onclick="addProduct()">เพิ่มสินค้า</button>
  </div>
  <div class="panel">
    <h3>รายการออเดอร์</h3>`;
  orders.forEach((o,i)=>{
    html+=`
    <div class="order">
      ${o.user} | ${o.product} | ${o.price}<br>
      <img src="${o.slip}" width="200"><br>
      <select onchange="setStatus(${i},this.value)">
        <option>รอดำเนินการ</option>
        <option>กำลังดำเนินการ</option>
        <option>ดำเนินการเสร็จสิ้น</option>
        <option>ดำเนินการไม่สำเร็จ</option>
      </select>
      <input placeholder="ข้อความถึงลูกค้า" onchange="setMsg(${i},this.value)">
    </div>`;
  });
  html+="</div>";
  document.getElementById("admin").innerHTML=html;
}

// เพิ่มสินค้า (อัพโหลดรูป)
function addProduct(){
  let n=document.getElementById("pname").value;
  let p=parseFloat(document.getElementById("pprice").value);
  let file=document.getElementById("pfile").files[0];
  if(!n || !p || !file) return alert("กรอกข้อมูลให้ครบและอัพโหลดรูป");

  let reader=new FileReader();
  reader.onload=function(){
    products.push({name:n, price:p, img:reader.result});
    save();
    loadShop();
    alert("เพิ่มสินค้าเรียบร้อย");
  }
  reader.readAsDataURL(file);
}

// แก้ไขสินค้า
function editProduct(i){
  let name=prompt("ชื่อสินค้าใหม่",products[i].name);
  let price=parseFloat(prompt("ราคาใหม่",products[i].price));
  let fileInput = prompt("ต้องการอัพโหลดรูปใหม่? (y/n)","n");
  if(fileInput.toLowerCase() === 'y'){
    let fileElem = document.createElement("input");
    fileElem.type="file"; fileElem.accept="image/*";
    fileElem.onchange = e=>{
      let reader=new FileReader();
      reader.onload=function(){
        products[i].img=reader.result;
        products[i].name=name;
        products[i].price=price;
        save();
        loadShop();
      }
      reader.readAsDataURL(e.target.files[0]);
    }
    fileElem.click();
  } else {
    products[i].name=name;
    products[i].price=price;
    save();
    loadShop();
  }
}

// ลบสินค้า
function deleteProduct(i){
  if(confirm("ลบสินค้า?")){
    products.splice(i,1);
    save();
    loadShop();
  }
}

function setStatus(i,v){ orders[i].status=v; save();}
function setMsg(i,v){ orders[i].msg=v; save();}

showLogin();
</script>
</body>
  </html>
