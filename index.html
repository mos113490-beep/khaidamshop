<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nextplay Store - ระบบจัดการไฟล์รูปภาพ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .bg-cat { background-image: url('https://img5.pic.in.th/file/secure-sv1/cat-bg.png'); background-size: contain; background-repeat: no-repeat; background-position: bottom left; }
        .active-nav { color: #0ea5e9; border-bottom: 2px solid #0ea5e9; }
    </style>
</head>
<body class="pb-24">
<div id="app">

    <nav class="bg-white p-4 sticky top-0 z-50 shadow-sm flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 bg-sky-500 rounded-lg flex items-center justify-center text-white font-bold">N</div>
            <h1 class="font-bold text-gray-800">NEXTPLAY <span class="text-sky-500">STORE</span></h1>
        </div>
        <div class="flex space-x-4 text-[11px] font-bold text-gray-500">
            <button @click="view = 'home'" :class="{'active-nav': view === 'home'}">หน้าหลัก</button>
            <button @click="view = 'admin'" :class="{'active-nav': view === 'admin'}">แอดมิน</button>
        </div>
    </nav>

    <div v-if="view === 'home'" class="p-4 space-y-4 animate-in fade-in">
        <div class="bg-sky-500 rounded-2xl p-6 text-white shadow-lg">
            <h2 class="text-xl font-bold">ยินดีต้อนรับสู่ Khaidam Shop</h2>
            <p class="text-xs opacity-80">เลือกซื้อไอดีเกมที่คุณต้องการได้ทันที</p>
        </div>

        <div class="grid grid-cols-1 gap-4">
            <div v-for="item in products" :key="item.id" class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <img :src="item.img" class="w-full h-48 object-cover" onerror="this.src='https://via.placeholder.com/400x200?text=No+Image'">
                <div class="p-4 flex justify-between items-center">
                    <div>
                        <h3 class="font-bold text-gray-800">{{ item.name }}</h3>
                        <p class="text-sky-500 font-black text-xl">{{ item.price }} ฿</p>
                    </div>
                    <button @click="openPay" class="bg-sky-500 text-white px-6 py-2 rounded-xl font-bold">ซื้อ</button>
                </div>
            </div>
        </div>
    </div>

    <div v-if="view === 'admin'" class="p-4 max-w-lg mx-auto">
        <div v-if="!isLoggedIn" class="bg-white p-8 rounded-3xl shadow-xl mt-10">
            <h2 class="text-center font-bold mb-6">ADMIN LOGIN</h2>
            <input v-model="user" placeholder="Username" class="w-full p-3 border rounded-xl mb-3 outline-none">
            <input v-model="pass" type="password" placeholder="Password" class="w-full p-3 border rounded-xl mb-6 outline-none">
            <button @click="login" class="w-full bg-gray-800 text-white py-3 rounded-xl font-bold">เข้าสู่ระบบ</button>
        </div>

        <div v-else class="space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border space-y-4">
                <h2 class="font-bold border-l-4 border-sky-500 pl-2">➕ เพิ่มสินค้าใหม่</h2>
                <input v-model="newItem.name" placeholder="ชื่อไอดีเกม" class="w-full p-3 border rounded-xl text-sm outline-none">
                <input v-model="newItem.price" type="number" placeholder="ราคา (บาท)" class="w-full p-3 border rounded-xl text-sm outline-none">
                
                <div class="border-2 border-dashed p-6 rounded-xl text-center bg-gray-50">
                    <p class="text-[10px] text-gray-400 mb-2 font-bold uppercase">เลือกไฟล์รูปภาพปกไอดีเกม</p>
                    <input type="file" @change="onFileChange" accept="image/*" class="text-[10px] w-full cursor-pointer">
                    
                    <div v-if="newItem.img" class="mt-4">
                        <img :src="newItem.img" class="w-full h-32 object-cover rounded-lg border shadow-sm">
                        <button @click="newItem.img = null" class="mt-2 text-[10px] text-red-500 font-bold">ลบรูปนี้</button>
                    </div>
                </div>

                <button @click="addItem" class="w-full bg-green-500 text-white py-4 rounded-xl font-bold shadow-md active:scale-95 transition">บันทึกสินค้าลงร้าน</button>
            </div>

            <div class="space-y-2">
                <h3 class="text-xs font-bold text-gray-400">รายการในคลัง</h3>
                <div v-for="(item, index) in products" class="bg-white p-3 rounded-xl flex items-center justify-between border">
                    <div class="flex items-center space-x-3">
                        <img :src="item.img" class="w-10 h-10 rounded-lg object-cover">
                        <span class="text-xs font-bold">{{ item.name }}</span>
                    </div>
                    <button @click="products.splice(index, 1)" class="text-red-400 text-xs">ลบ</button>
                </div>
            </div>
        </div>
    </div>

    <div v-if="showPay" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm" @click.self="showPay = false">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-8 relative shadow-2xl animate-in zoom-in duration-200">
            <button @click="showPay = false" class="absolute top-4 right-4 bg-gray-100 text-gray-400 w-12 h-12 rounded-full flex items-center justify-center font-bold text-2xl active:scale-90 transition">✕</button>
            
            <h3 class="font-bold text-gray-800 text-lg mb-6 text-center">ช่องทางการชำระเงิน</h3>
            <div class="bg-sky-50 p-4 rounded-3xl mb-6">
                <img src="https://api.gemini.google.com/api/devices/v1/blobs/uploaded:1000016197.jpg" class="w-48 mx-auto rounded-2xl shadow-lg border-4 border-white">
            </div>
            
            <div class="space-y-3">
                <div class="bg-orange-50 p-4 rounded-2xl flex justify-between border-l-4 border-orange-500">
                    <span class="text-orange-700 text-[10px] font-black italic">WALLET</span>
                    <span class="font-bold text-sm">096-817-7154</span>
                </div>
                <div class="bg-green-50 p-4 rounded-2xl flex justify-between border-l-4 border-green-500">
                    <span class="text-green-700 text-[10px] font-black italic">K-BANK</span>
                    <span class="font-bold text-sm">201-3-16151-0</span>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    const { createApp } = Vue
    createApp({
        data() {
            return {
                view: 'home', isLoggedIn: false, showPay: false,
                user: '', pass: '',
                newItem: { name: '', price: '', img: null },
                products: [
                    { id: 1, name: 'ID ROV สกินครบ', price: 950, img: 'https://via.placeholder.com/400x200' }
                ]
            }
        },
        methods: {
            login() {
                if(this.user === 'danainat' && this.pass === 'danainat') this.isLoggedIn = true;
                else alert('รหัสผ่านไม่ถูกต้อง');
            },
            // 🔥 ฟังก์ชันแปลงไฟล์รูปจากเครื่องเป็นโค้ดเพื่อแสดงผล
            onFileChange(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (f) => {
                        this.newItem.img = f.target.result; // เก็บไฟล์รูปไว้ในตัวแปร img
                    };
                    reader.readAsDataURL(file);
                }
            },
            addItem() {
                if(!this.newItem.name || !this.newItem.img) return alert('กรุณาเลือกไฟล์รูปและกรอกชื่อสินค้า');
                this.products.unshift({ id: Date.now(), ...this.newItem });
                this.newItem = { name: '', price: '', img: null };
                alert('เพิ่มสินค้าสำเร็จ!');
                this.view = 'home';
            },
            openPay() { this.showPay = true; }
        }
    }).mount('#app')
</script>
</body>
</html>
